<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль - Панель пользователя</title>
    <link rel="stylesheet" href="../css/user-dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Портал</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="../user-dashboard/user-dashboard.html" class="nav-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Главная
                </a>
                <a href="../user-profile/user-profile.html" class="nav-item active">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Мой профиль
                </a>
                <a href="../user-messages/user-messages.html" class="nav-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                    </svg>
                    Сообщения
                    <span class="badge" id="messagesBadge">0</span>
                </a>
                <a href="#" class="nav-item" onclick="logout()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Выход
                </a>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <div class="content-header">
                <div>
                    <h1>Мой профиль</h1>
                    <p class="subtitle">Просмотр и управление вашей информацией</p>
                </div>
                <button class="btn-primary" onclick="window.location.href='profile-form.html'">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    Редактировать
                </button>
            </div>

            <!-- Профиль -->
            <div class="profile-container">
                <!-- Личная информация -->
                <div class="profile-section">
                    <h2 class="section-title">Личная информация</h2>
                    <div class="profile-card">
                        <div class="profile-item">
                            <span class="profile-label">Имя</span>
                            <span class="profile-value" id="firstName"></span>
                        </div>
                        <div class="profile-item">
                            <span class="profile-label">Фамилия</span>
                            <span class="profile-value" id="lastName"></span>
                        </div>
                        <div class="profile-item">
                            <span class="profile-label">Отчество</span>
                            <span class="profile-value" id="middleName"></span>
                        </div>
                    </div>
                </div>

                <!-- Контактная информация -->
                <div class="profile-section">
                    <h2 class="section-title">Контактная информация</h2>
                    <div class="profile-card">
                        <div class="profile-item">
                            <span class="profile-label">Средство связи</span>
                            <span class="profile-value" id="communication"></span>
                        </div>
                        <div class="profile-item">
                            <span class="profile-label">Контактные данные</span>
                            <span class="profile-value" id="username"></span>
                        </div>
                    </div>
                </div>

                <!-- Рабочая информация -->
                <div class="profile-section">
                    <h2 class="section-title">Рабочая информация</h2>
                    <div class="profile-card">
                        <div class="profile-item">
                            <span class="profile-label">Должность</span>
                            <span class="profile-value" id="grade"></span>
                        </div>
                        <div class="profile-item">
                            <span class="profile-label">Должность</span>
                            <span class="profile-value" id="position">Разработчик</span>
                        </div>
                        <div class="profile-item">
                            <span class="profile-label">Департамент</span>
                            <span class="profile-value" id="department">Разработка</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно успеха -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="success-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 id="successTitle">Успешно!</h3>
            </div>
            <div class="modal-body">
                <p id="successMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeSuccessModal()">Отлично</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно ошибки -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="error-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h3 id="errorTitle">Ошибка</h3>
            </div>
            <div class="modal-body">
                <p id="errorMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeErrorModal()">Понятно</button>
            </div>
        </div>
    </div>

    <style>
        .profile-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .profile-section {
            background: white;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 24px;
        }

        .profile-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-item {
            display: flex;
            justify-content: space-between;
            align-items: start;
            padding: 16px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .profile-item:last-child {
            border-bottom: none;
        }

        .profile-label {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        .profile-value {
            color: #1e3a8a;
            font-size: 15px;
            font-weight: 500;
            text-align: right;
            max-width: 60%;
        }

        .access-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .access-badge.admin {
            background: #fee2e2;
            color: #dc2626;
        }

        .access-badge.user {
            background: #dbeafe;
            color: #2563eb;
        }

        @media (max-width: 768px) {
            .profile-item {
                flex-direction: column;
                gap: 8px;
            }

            .profile-value {
                text-align: left;
                max-width: 100%;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .btn-primary {
                width: 100%;
            }
        }
    </style>

    <script src="user-profile.js"></script>
</body>
</html>
