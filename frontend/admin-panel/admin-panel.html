<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель</title>
    <link rel="stylesheet" href="../css/admin-panel.css">
</head>
<body>
    <div class="admin-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Админ панель</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="departments" onclick="switchSection(event, 'departments')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    Департаменты
                </a>
                <a href="#" class="nav-item" data-section="requests" onclick="switchSection(event, 'requests')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Заявки
                    <span class="badge" id="requestsBadge">0</span>
                </a>
                <a href="#" class="nav-item" onclick="logout()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Выход
                </a>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <!-- Секция департаментов -->
            <div id="departments-section" class="content-section active">
                <div class="content-header">
                    <h1>Управление департаментами</h1>
                    <button class="btn-primary" onclick="openAddDepartmentModal()">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Добавить департамент
                    </button>
                </div>

                <div class="departments-grid" id="departmentsGrid">
                    <!-- Департаменты будут загружены здесь -->
                </div>
            </div>

            <!-- Секция заявок -->
            <div id="requests-section" class="content-section">
                <div class="content-header">
                    <h1>Заявки на вступление</h1>
                </div>

                <div class="requests-list" id="requestsList">
                    <!-- Заявки будут загружены здесь -->
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно добавления департамента -->
    <div id="addDepartmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Добавить новый департамент</h3>
            </div>
            <form id="addDepartmentForm" class="modal-body">
                <div class="form-group">
                    <label for="departmentName">Название департамента <span class="required">*</span></label>
                    <input type="text" id="departmentName" placeholder="Например: Разработка" required>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeAddDepartmentModal()">Отмена</button>
                <button type="submit" form="addDepartmentForm" class="btn-primary">Создать</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно просмотра сотрудников -->
    <div id="employeesModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="employeesModalTitle">Сотрудники департамента</h3>
            </div>
            <div class="modal-body">
                <div class="employees-list" id="employeesList">
                    <!-- Сотрудники будут загружены здесь -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-primary" onclick="closeEmployeesModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно успеха -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="success-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 id="successTitle">Успешно!</h3>
            </div>
            <div class="modal-body">
                <p id="successMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeSuccessModal()">Отлично</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно ошибки -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="error-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h3 id="errorTitle">Ошибка</h3>
            </div>
            <div class="modal-body">
                <p id="errorMessage"></p>
                <ul id="errorList"></ul>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeErrorModal()">Понятно</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно просмотра профиля -->
    <div id="profileModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="profileModalTitle">Профиль пользователя</h3>
            </div>
            <div class="modal-body">
                <div id="profileContent">
                    <!-- Профиль будет загружен здесь -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-primary" onclick="closeProfileModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="admin-panel.js"></script>
</body>
</html>
