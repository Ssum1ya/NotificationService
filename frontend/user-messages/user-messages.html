<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения - Панель пользователя</title>
    <link rel="stylesheet" href="../css/user-dashboard.css">
    <link rel="stylesheet" href="../css/user-messages.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Портал</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="../user-dashboard/user-dashboard.html" class="nav-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Главная
                </a>
                <a href="../user-profile/user-profile.html" class="nav-item">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Мой профиль
                </a>
                <a href="../user-messages/user-messages.html" class="nav-item active">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                    </svg>
                    Сообщения
                    <span class="badge" id="messagesBadge">0</span>
                </a>
                <a href="#" class="nav-item" onclick="logout()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Выход
                </a>
            </nav>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <div class="content-header">
                <div>
                    <h1>Сообщения</h1>
                    <p class="subtitle">Общение с коллегами</p>
                </div>
                <button class="btn-primary" onclick="openNewMessageModal()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Новое сообщение
                </button>
            </div>

            <!-- Сообщения -->
            <div class="messages-container">
                <div class="messages-list-container">
                    <div class="messages-header">
                        <h2>Диалоги</h2>
                        <div class="search-box">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <input type="text" placeholder="Поиск..." id="searchInput" oninput="filterMessages()">
                        </div>
                    </div>
                    <div class="messages-list" id="messagesList">
                        <!-- Список диалогов будет загружен здесь -->
                    </div>
                </div>
                
                <div class="messages-chat-container" id="chatContainer">
                    <div class="empty-chat">
                        <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                        <h3>Выберите диалог</h3>
                        <p>Выберите диалог из списка или начните новый</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно нового сообщения -->
    <div id="newMessageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новое сообщение</h3>
            </div>
            <form id="newMessageForm" class="modal-body">
                <div class="form-group">
                    <label for="recipientSelect">Получатель <span class="required">*</span></label>
                    <select id="recipientSelect" required>
                        <option value="">Выберите получателя</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="messageText">Сообщение <span class="required">*</span></label>
                    <textarea id="messageText" rows="5" placeholder="Введите ваше сообщение..." required></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeNewMessageModal()">Отмена</button>
                <button type="submit" form="newMessageForm" class="btn-primary">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно успеха -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="success-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 id="successTitle">Успешно!</h3>
            </div>
            <div class="modal-body">
                <p id="successMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeSuccessModal()">Отлично</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно ошибки -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="error-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h3 id="errorTitle">Ошибка</h3>
            </div>
            <div class="modal-body">
                <p id="errorMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeErrorModal()">Понятно</button>
            </div>
        </div>
    </div>

    <script src="user-messages.js"></script>
</body>
</html>
