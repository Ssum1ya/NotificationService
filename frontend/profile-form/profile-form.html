<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заполнение профиля</title>
    <link rel="stylesheet" href="../css/profile-form.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <!-- Прогресс-бар -->
            <div class="progress-bar">
                <div class="progress-step active" data-step="1">
                    <div class="step-circle">1</div>
                    <div class="step-label">Личные данные</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="2">
                    <div class="step-circle">2</div>
                    <div class="step-label">Контакты</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step" data-step="3">
                    <div class="step-circle">3</div>
                    <div class="step-label">Работа</div>
                </div>
            </div>

            <form id="profileForm">
                <!-- Шаг 1: Личные данные -->
                <div class="form-step active" data-step="1">
                    <h2>Личные данные</h2>
                    <p class="step-description">Заполните основную информацию о себе</p>

                    <div class="form-group">
                        <label for="lastName">Фамилия <span class="required">*</span></label>
                        <input type="text" id="lastName" placeholder="Введите фамилию" required>
                    </div>

                    <div class="form-group">
                        <label for="firstName">Имя <span class="required">*</span></label>
                        <input type="text" id="firstName" placeholder="Введите имя" required>
                    </div>

                    <div class="form-group">
                        <label for="middleName">Отчество (при наличии)</label>
                        <input type="text" id="middleName" placeholder="Введите отчество">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">Отмена</button>
                        <button type="button" class="btn-primary" onclick="nextStep()">Далее</button>
                    </div>
                </div>

                <!-- Шаг 2: Контакты -->
                <div class="form-step" data-step="2">
                    <h2>Контакты</h2>

                    <div class="form-group">
                        <label for="messenger">Рекомендуемый вид связи <span class="required">*</span></label>
                        <select id="messenger" required>
                            <option value="">Выберите площадку</option>
                            <option value="telegram">Telegram</option>
                            <option value="email">Mail</option>
                            <option value="vk">Vk</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="username" id="usernameLabel">
                            Контактные данные<span class="required">*</span>
                        </label>
                        <input type="text" id="username" placeholder="Введите контактные данные" required>
                    </div>


                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="prevStep()">Назад</button>
                        <button type="button" class="btn-primary" onclick="nextStep()">Далее</button>
                    </div>
                </div>

                <!-- Шаг 3: Работа -->
                <div class="form-step" data-step="3">
                    <h2>Рабочая информация</h2>
                    <p class="step-description">Расскажите о вашей должности</p>

                    <div class="form-group">
                        <label for="position">Позиция <span class="required">*</span></label>
                        <select id="position" required>
                            <option value="">Выберите позицию</option>
                            <option value="Developer">Разработчик</option>
                            <option value="Tester">Тестировщик</option>
                            <option value="Analyst">Аналитик</option>
                            <option value="Designer">Дизайнер</option>
                            <option value="Manager">Менеджер проекта</option>
                            <option value="Devops">DevOps инженер</option>
                            <option value="DataScientist">Data Scientist</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="grade">Уровень <span class="required">*</span></label>
                        <select id="grade" required>
                            <option value="">Выберите уровень</option>
                            <option value="Intern">Intern (Стажер)</option>
                            <option value="Junior">Junior</option>
                            <option value="Middle">Middle</option>
                            <option value="Senior">Senior</option>
                            <option value="Lead">Lead</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="department">Департамент<span class="required">*</span></label>
                        <select id="department" required>
                            <option value="" id="">Загрузка...</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="prevStep()">Назад</button>
                        <button type="submit" class="btn-primary">Сохранить</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно для ошибок -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="error-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h3 id="errorTitle">Ошибка валидации</h3>
            </div>
            <div class="modal-body">
                <p id="errorMessage"></p>
                <ul id="errorList"></ul>
            </div>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeErrorModal()">Понятно</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно для успеха -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="success-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 id="successTitle">Успешно!</h3>
            </div>
            <div class="modal-body">
                <p id="successMessage"></p>
            </div>
        </div>
    </div>

    <script src="profile-form.js"></script>
</body>
</html>
